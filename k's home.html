<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SMU Student Hub</title>
        <style>
        ody{margin: 0;
             font-family: Arial, Helvetica, sans-serif;}
        .logo{position: absolute;
             width: 300px;
              opacity: 0.08;
              animation: moveLogo 15s linear infinite;
              z-index: 1;}
        @keyframes moveLogo
         {0% {top: 10%; left: -100px;}
         50% {top: 40%; left: 80%;} 
         100% {top: 70%; left: -100px;} } 
         nav{display: flex;
             justify-content: space-between;
            align-items: center;
            padding: 5px 1px;
            background-color: rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 10;}
        nav ul{display: flex;
              list-style: none;}
        nav ul li{margin-left: 20px;}
        nav ul li a{color: white;
                    text-decoration: none;
                    background-color: rgba(255, 255, 255, 0.15);
                    padding: 8px 18px;
                    border-radius: 30px;
                    transition: 0.3s;}
        nav h1{color: orange;
               margin: 0;}
        .nav-logo{width: 50px;
                  margin-right: 5px;}          
        .hero{height: 100vh;
             background-color: #002F6C;
              background-image: url("campus.jpg");
               background-position: center;
                background-size: cover;
            position: relative;} 
        .hero-content{position: absolute;
                     top: 50%;
                     left: 50%;
                      transform: translate(-50%, -20%);
                      text-align: center;
                      color: white;
                      z-index: 5;
                      width: 100%;}
        .hero-content h2{font-size: 50px;}
        .hero-content button{padding: 14px 30px;
                            border: none;
                            border-radius: 50px;
                            background-color: orange;
                            color: white;
                            font-size: 16px;
                            cursor: pointer;}
        .hero-content p{
               font-family:Georgia, 'Times New Roman', Times, serif;      
               font-size : 22px;
                font-style: italic;
                margin-bottom: 20px;}
        .explore-btn{display: inline-block;
                    padding: 14px 30px;
                    border-radius: 50px;
                    background-color: orange;
                    color: white;
                    font-size: 16px;
                    text-decoration: none;
                    transition: 0.3s;}
        .explore-btn:hover{background-color: darkorange;
                           transform: scaleX(1.05);
                        }


        </style> 
    </head>
    <body>
        <div class="hero">
            <img src="logo.png" 
            class="logo" 
            alt="logo">
         <nav>
                <img src="logo.png" class="nav-logo" alt="logo">
                <h1>SMU Student Hub</h1>
                <ul>
                    <li><a href="homepage.html">Home</a></li>
                    <li><a href="map.html">Map</a></li>
                    <li><a href="timetable.html">Timetable</a></li>
                    <li><a href="resources.html">Resources</a></li>
                    <li><a href="Quick-links.html">Links</a></li>
                    <li><a href="announcements.html">Announcements</a></li>
                </ul>
            </nav>
            <div class="hero-content">
                <h2>Welcome to SMU Student Hub</h2>
                <p>"Your guide to campus life"</p>
                <a href="homepagecards.html" class="explore-btn">Explore</a>
            <section class="cards">
                 <div class="card"></div>
                 </div>


            </section>
            </div>
    </body>

</html>
