<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Campus Map</title>
        <style>
            body{
                margin:0;
                font-family:Arial, sans-serif;
                background:#f4f4f4;
                display:flex;
                justify-content:center;
                align-items:center;
                height:100vh;
            }
            .map-container{
                position:relative;
                width:85%;
                max-width:95%;
            }
            .campus-map{
                width:100%;

        <link rel="stylesheet" href="buttons.css">

    <div class="nsb-button"
